<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Hub</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Arial, sans-serif;
}

body {
    background-color: #08111f; 
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

/* --- Hamburger Menu Icon --- */
.menu-btn {
    position: fixed;
    top: 25px;
    left: 25px;
    z-index: 1001;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 5px;
    transition: 0.3s;
}

.menu-btn .bar {
    width: 30px;
    height: 3px;
    background-color: #6bbcff;
    border-radius: 2px;
    transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}

.menu-btn.open .bar:nth-child(1) { transform: translateY(9px) rotate(45deg); }
.menu-btn.open .bar:nth-child(2) { opacity: 0; }
.menu-btn.open .bar:nth-child(3) { transform: translateY(-9px) rotate(-45deg); }

/* --- Sidebar Dashboard --- */
.sidebar {
    position: fixed;
    top: 0;
    left: -340px;
    width: 320px;
    height: 100vh;
    background: #0d182b; 
    border-right: 1px solid rgba(255, 255, 255, 0.08);
    z-index: 1000;
    transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    padding: 90px 20px 20px 20px;
    box-shadow: 5px 0 30px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    gap: 25px;
    overflow-y: auto;
}

.sidebar.open {
    left: 0;
}

.sidebar h2 {
    color: #6bbcff;
    font-size: 22px;
    border-bottom: 2px solid rgba(107, 188, 255, 0.2);
    padding-bottom: 8px;
}

.sidebar-section h3 {
    font-size: 14px;
    color: #a3cbff;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
}

.key-box {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 12px;
    border-radius: 8px;
    font-family: 'Courier New', Courier, monospace;
    font-weight: bold;
    font-size: 14px;
    text-align: center;
}

.key-box.permanent {
    border-color: #f59e0b;
    color: #f59e0b;
    background: rgba(245, 158, 11, 0.05);
    text-shadow: 0 0 5px rgba(245, 158, 11, 0.3);
}

.history-container {
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-height: 350px;
    overflow-y: auto;
    padding-right: 5px;
}

.history-item {
    background: rgba(255, 255, 255, 0.03);
    border-radius: 8px;
    padding: 10px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-left: 4px solid #ef4444;
    font-size: 13px;
}

.history-item.active {
    border-left-color: #10b981;
}

.history-item .key-text {
    font-family: monospace;
    color: #e2e8f0;
}

.status-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 12px;
    font-weight: bold;
}

.history-item.expired .status-badge {
    background: rgba(239, 68, 68, 0.15);
    color: #f87171;
}

.history-item.active .status-badge {
    background: rgba(16, 185, 129, 0.15);
    color: #34d399;
}

/* --- Main Central Card --- */
@keyframes fadeInUp {
    from { transform: translateY(20px); }
    to { transform: translateY(0); }
}

@keyframes pulseGlow {
    0% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
    50% { box-shadow: 0 0 35px rgba(107, 188, 255, 0.5); }
    100% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
}

.card {
    width: 360px;
    background: #13233f; 
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 18px;
    padding: 25px;
    text-align: center;
    opacity: 1; /* Kept at 1 so it never accidentally stays invisible */
    animation: fadeInUp 0.4s ease-out forwards, pulseGlow 4s infinite ease-in-out;
    position: relative;
    z-index: 10;
}

h1 {
    color: #6bbcff;
    margin-bottom: 18px;
    font-size: 28px;
    letter-spacing: 1px;
    text-shadow: 0 0 10px rgba(107, 188, 255, 0.5);
}

button {
    width: 100%;
    padding: 13px;
    margin-top: 12px;
    border: none;
    border-radius: 10px;
    background: #3b82f6;
    color: white;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.25s;
    position: relative;
    overflow: hidden;
}

button:hover {
    transform: scale(1.04);
    background: #2563eb;
}

button:active {
    transform: scale(0.97);
}

#status {
    margin-top: 15px;
    font-weight: bold;
    color: #6bbcff;
    min-height: 20px;
}

/* --- Particles --- */
.particle {
    position: fixed;
    pointer-events: none;
    border-radius: 50%;
    animation: explode 0.6s ease-out forwards;
    z-index: 9999;
}

@keyframes explode {
    0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    100% { transform: translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(0); opacity: 0; }
}

/* Scrollbars */
.sidebar::-webkit-scrollbar, .history-container::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb, .history-container::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
</style>
</head>
