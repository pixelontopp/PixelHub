<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Hub</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#08111f;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:360px;
    background:#13233f;
    border-radius:18px;
    padding:25px;
    text-align:center;
    box-shadow:0 0 30px #3b82f655;
}

h1{
    color:#6bbcff;
    margin-bottom:18px;
}

button{
    width:100%;
    padding:13px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#3b82f6;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.25s;
}

button:hover:not(:disabled){
    transform:scale(1.03);
}

button:disabled {
    background: #4b5563;
    cursor: not-allowed;
}

#status{
    margin-top:15px;
    font-weight:bold;
    color:#6bbcff;
}
</style>
</head>

<body>

<div class="card">

<h1>Pixel Hub</h1>

<button id="genBtn" onclick="generateKey()">Generate Key</button>

<div id="status"></div>

<a href="https://pixelontopp.github.io/Generated-Keys/" target="_blank">
<button>🔑 GENERATED KEYS</button>
</a>

<a href="https://discord.gg/mTZasXnAHc" target="_blank">
<button>💬 Discord</button>
</a>

<a href="https://youtube.com/@pixelontopp" target="_blank">
<button>▶️ YouTube</button>
</a>

</div>

<script>
const LINKVERTISE_URL = "https://link-hub.net/1406248/JoChKQi2Tzdg"; 
const MINIMUM_TIME_REQUIRED = 15000; // 15 seconds minimum (Adjust as needed)
const BAN_DURATION = 120000; // 2 minutes in milliseconds

window.addEventListener('DOMContentLoaded', () => {
    const urlParams = new URLSearchParams(window.location.search);
    const statusDiv = document.getElementById("status");
    const genBtn = document.getElementById("genBtn");

    // 1. Check if the user is currently banned
    const bannedUntil = localStorage.getItem('bannedUntil');
    if (bannedUntil && Date.now() < bannedUntil) {
        startBanCountdown(bannedUntil - Date.now());
        return;
    }

    // 2. Process returning user
    if (urlParams.get('status') === 'completed') {
        const clickTime = localStorage.getItem('clickTime');
        const currentTime = Date.now();

        // If they have no click timestamp, or they completed it faster than MINIMUM_TIME_REQUIRED
        if (!clickTime || (currentTime - clickTime) < MINIMUM_TIME_REQUIRED) {
            // Trigger the 2-minute ban
            const newBanExpiry = Date.now() + BAN_DURATION;
            localStorage.setItem('bannedUntil', newBanExpiry);
            startBanCountdown(BAN_DURATION);
            return;
        }

        // Clean pass: User took an appropriate amount of time
        genBtn.innerHTML = "Key Unlocked";
        genBtn.style.background = "#22c55e"; 
        genBtn.disabled = true;

        statusDiv.style.color = "#22c55e";
        statusDiv.innerHTML = "Verifying completion... Done!";
        
        setTimeout(() => {
            const hourID = Math.floor(Date.now() / 3600000); 
            const scrambled = (hourID * 3) + 102345; 
            statusDiv.innerHTML = "YOUR KEY:<br><span style='color:white; font-size:18px; display:inline-block; margin-top:8px;'>PIXELKEY_" + scrambled + "</span>";
            
            // Clear timestamps once successfully claimed
            localStorage.removeItem('clickTime');
        }, 1500);
    }
});

function generateKey(){
    const status = document.getElementById("status");
    
    // Save the exact millisecond they clicked the button
    localStorage.setItem('clickTime', Date.now());

    status.style.color = "#6bbcff";
    status.innerHTML = "Redirecting to Linkvertise...";

    setTimeout(() => {
        window.location.href = LINKVERTISE_URL;
    }, 1000);
}

// Function to handle the 2-minute visual lockdown
function startBanCountdown(duration) {
    const statusDiv = document.getElementById("status");
    const genBtn = document.getElementById("genBtn");
    
    genBtn.disabled = true;
    genBtn.innerHTML = "System Locked";
    genBtn.style.background = "#ef4444"; // Red button

    let timeRemaining = Math.ceil(duration / 1000);
    statusDiv.style.color = "#ff4a4a";
    statusDiv.innerHTML = `Bypass detected! You are blocked for ${timeRemaining}s`;

    const banTimer = setInterval(() => {
        timeRemaining--;
        statusDiv.innerHTML = `Bypass detected! You are blocked for ${timeRemaining}s`;

        if (timeRemaining <= 0) {
            clearInterval(banTimer);
            localStorage.removeItem('bannedUntil');
            localStorage.removeItem('clickTime');
            
            // Reset page state back to normal
            genBtn.disabled = false;
            genBtn.innerHTML = "Generate Key";
            genBtn.style.background = "#3b82f6";
            statusDiv.innerHTML = "";
            
            // Clean up the URL so they can retry fairly
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    }, 1000);
}
</script>

</body>
</html>
